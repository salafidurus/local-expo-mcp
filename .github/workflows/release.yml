name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"

permissions:
  contents: write
  issues: write
  pull-requests: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Determine publish label for pushed commit
        id: publish_gate
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" -H "Accept: application/vnd.github+json")
          if [ "$(echo "$prs" | jq 'length')" -eq 0 ]; then
            echo "publish_label=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$prs" | jq -e 'map(select(any(.labels[]?; .name == "publish"))) | length > 0' >/dev/null; then
            echo "publish_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_label=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine if scheduled release is pending
        id: schedule_gate
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          release_pending=$(node - <<'NODE'
          const { execSync } = require("node:child_process");
          const timeval = execSync("npm view local-expo-mcp time.modified --json").toString().trim();
          const modified = JSON.parse(timeval);
          const last = Date.parse(modified);
          const now = Date.now();
          const threshold = 7 * 24 * 60 * 60 * 1000;
          if (isNaN(last) || last <= 0) {
            console.log("false");
          } else {
            console.log(now - last >= threshold ? "true" : "false");
          }
          NODE
          )
          echo "release_pending=$release_pending" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: release_gate
        run: |
          run_release=true
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ steps.publish_gate.outputs.publish_label }}" != "true" ]; then
            run_release=false
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ steps.schedule_gate.outputs.release_pending }}" != "true" ]; then
            run_release=false
          fi
          echo "run_release=$run_release" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        if: steps.release_gate.outputs.run_release == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        if: steps.release_gate.outputs.run_release == 'true'
        run: bun install --frozen-lockfile

      - name: Run commitlint
        if: steps.release_gate.outputs.run_release == 'true'
        run: bunx commitlint --from ${{ github.sha }}^ --to ${{ github.sha }}

      - name: Build
        if: steps.release_gate.outputs.run_release == 'true'
        run: bun run build

      - name: Run tests
        if: steps.release_gate.outputs.run_release == 'true'
        run: bunx vitest run

      - name: Debug OIDC env
        if: steps.release_gate.outputs.run_release == 'true'
        run: |
          node -e "console.log({ACTIONS_ID_TOKEN_REQUEST_URL: !!process.env.ACTIONS_ID_TOKEN_REQUEST_URL, ACTIONS_ID_TOKEN_REQUEST_TOKEN: !!process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN})"

      - name: Debug npm auth context
        if: steps.release_gate.outputs.run_release == 'true'
        run: |
          npm config list

      - name: Publish release
        if: steps.release_gate.outputs.run_release == 'true'
        run: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
