name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine publish label for pushed commit
        id: publish_gate
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" -H "Accept: application/vnd.github+json")
          if [ "$(echo "$prs" | jq 'length')" -eq 0 ]; then
            echo "publish_label=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$prs" | jq -e 'map(select(any(.labels[]?; .name == "publish"))) | length > 0' >/dev/null; then
            echo "publish_label=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_label=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node for npm publish
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        run: bun install --frozen-lockfile

      - name: Run commitlint
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        run: bun run commitlint

      - name: Run tests
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        run: bunx vitest run

      - name: Build
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        run: bun run build

      - name: Publish release
        if: github.event_name == 'workflow_dispatch' || steps.publish_gate.outputs.publish_label == 'true'
        run: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
