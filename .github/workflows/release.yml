name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      prepare_release_pr: ${{ steps.push_gate.outputs.prepare_release_pr || 'false' }}
      publish_release: ${{ steps.push_gate.outputs.publish_release || 'false' }}
      pr_title: ${{ steps.push_gate.outputs.pr_title }}
      pr_body: ${{ steps.push_gate.outputs.pr_body }}
      source_sha: ${{ steps.push_gate.outputs.source_sha }}
    steps:
      - name: Determine release mode from pushed commit
        id: push_gate
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prs='[]'
          for attempt in 1 2 3 4 5; do
            prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" -H "Accept: application/vnd.github+json")
            if [ "$(echo "$prs" | jq 'length')" -gt 0 ]; then
              break
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep 2
            fi
          done

          publish_release=$(echo "$prs" | jq -r 'map(select(.head.ref == "release/next")) | length > 0')
          prepare_pr=$(echo "$prs" | jq -r 'if any(.[]?; .head.ref == "release/next") then false else map(select(any(.labels[]?; .name == "publish") and .head.ref != "release/next")) | length > 0 end')
          pr_title=$(echo "$prs" | jq -r 'map(select(any(.labels[]?; .name == "publish") and .head.ref != "release/next")) | .[0].title // ""')
          pr_body=$(echo "$prs" | jq -r 'map(select(any(.labels[]?; .name == "publish") and .head.ref != "release/next")) | .[0].body // ""')

          echo "prepare_release_pr=$prepare_pr" >> "$GITHUB_OUTPUT"
          echo "publish_release=$publish_release" >> "$GITHUB_OUTPUT"
          {
            echo 'pr_title<<EOF'
            echo "$pr_title"
            echo 'EOF'
            echo 'pr_body<<EOF'
            echo "$pr_body"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "source_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  prepare_release_pr:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.prepare_release_pr == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bunx vitest run

      - name: Prepare release PR content
        env:
          RELEASE_PR_TITLE: ${{ needs.gate.outputs.pr_title }}
          RELEASE_PR_BODY: ${{ needs.gate.outputs.pr_body }}
          RELEASE_SOURCE_SHA: ${{ needs.gate.outputs.source_sha }}
        run: |
          bun run release:prepare-pr > release-plan.json
          cat release-plan.json

      - name: Commit and push release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- package.json CHANGELOG.md .release-plan.json; then
            echo "No release PR changes detected"
            exit 0
          fi
          version=$(jq -r '.version' release-plan.json)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B release/next
          git add package.json CHANGELOG.md .release-plan.json
          git commit -m "chore(release): ${version}"
          git push --force-with-lease origin release/next

      - name: Create or update release PR
        env:
          GH_TOKEN: ${{ secrets.SALAFIDURUS_PR_WRITE }}
        run: |
          title=$(jq -r '.title' release-plan.json)
          jq -r '.body' release-plan.json > release-pr-body.md
          if gh pr view release/next --json number >/dev/null 2>&1; then
            gh pr edit release/next --title "$title" --body-file release-pr-body.md
          else
            gh pr create --base main --head release/next --title "$title" --body-file release-pr-body.md
          fi

  publish_release:
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.publish_release == 'true'
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run tests
        run: bunx vitest run

      - name: Publish package
        run: bun run release:publish

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi
          node - <<'NODE' > release-notes.md
          const fs = require('node:fs');
          const version = require('./package.json').version;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const escaped = version.replace(/\./g, '\\.');
          const match = changelog.match(new RegExp(`## \\[${escaped}\\] - .*?(?=\\n## \\[|$)`, 's'));
          process.stdout.write((match?.[0] ?? `Release ${version}`).trim() + '\n');
          NODE
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md
          else
            gh release create "$tag" --title "$tag" --notes-file release-notes.md
          fi
