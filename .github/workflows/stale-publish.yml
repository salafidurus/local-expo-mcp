name: Stale Publish

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  stale-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node for npm publish
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run commitlint
        run: bun run commitlint

      - name: Check last npm publish age
        id: publish_age
        shell: bash
        run: |
          LAST_PUBLISH=$(npm view local-expo-mcp time.modified 2>/dev/null || true)
          if [ -z "$LAST_PUBLISH" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AGE_CHECK=$(node -e "const publishedAt = new Date(process.argv[1]).getTime(); const staleAfterMs = 7 * 24 * 60 * 60 * 1000; process.stdout.write(String(Date.now() - publishedAt > staleAfterMs));" "$LAST_PUBLISH")
          echo "stale=$AGE_CHECK" >> "$GITHUB_OUTPUT"

      - name: Check for pending semantic release
        id: release_check
        shell: bash
        run: |
          set -o pipefail
          bunx semantic-release --dry-run 2>&1 | tee semantic-release-dry-run.log || true
          if grep -q "The next release version is" semantic-release-dry-run.log; then
            echo "release_pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.publish_age.outputs.stale == 'true' && steps.release_check.outputs.release_pending == 'true'
        run: bun run build

      - name: Run tests
        if: steps.publish_age.outputs.stale == 'true' && steps.release_check.outputs.release_pending == 'true'
        run: bunx vitest run

      - name: Publish stale release
        if: steps.publish_age.outputs.stale == 'true' && steps.release_check.outputs.release_pending == 'true'
        run: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
