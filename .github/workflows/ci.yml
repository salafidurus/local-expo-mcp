name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: bun install

      - name: Install dependencies
        if: github.actor != 'dependabot[bot]'
        run: bun install --frozen-lockfile

      - name: Run commitlint for pull requests
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

      - name: Run commitlint for pushes
        if: github.event_name != 'pull_request'
        run: bun run commitlint

      - name: Guard automation-owned release files
        if: github.event_name == 'pull_request' && github.head_ref != 'release/next'
        run: |
          set -euo pipefail
          changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$changed" | grep -E '^(CHANGELOG\.md|\.release-plan\.json)$' >/dev/null; then
            echo "Automation-owned release files may only change on release/next PRs."
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Run tests
        run: bunx vitest run
